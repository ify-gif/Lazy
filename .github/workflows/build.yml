name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 70
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci attempt $attempt/$maxAttempts"
            npm ci
            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded"
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "npm ci failed; retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            }
          }
          throw "npm ci failed after $maxAttempts attempts"

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Playwright install attempt $attempt/$maxAttempts"
            npx playwright install chromium
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Playwright install succeeded"
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Playwright install failed; retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          throw "Playwright install failed after $maxAttempts attempts"

      - name: Verify release quality gate (Windows)
        if: runner.os == 'Windows'
        run: npm run verify:installer-config && npm run release:verify:ci

      - name: Verify release quality gate (macOS)
        if: runner.os == 'macOS'
        run: npm run release:verify:ci

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run electron-build -- --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run electron-build -- --mac dmg zip --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/*.dmg
            release/*.zip
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: false
