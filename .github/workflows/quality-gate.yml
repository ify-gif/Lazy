name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci attempt $attempt/$maxAttempts"
            npm ci
            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded"
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "npm ci failed; retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            }
          }
          throw "npm ci failed after $maxAttempts attempts"

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Playwright install attempt $attempt/$maxAttempts"
            npx playwright install chromium
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Playwright install succeeded"
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Playwright install failed; retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          throw "Playwright install failed after $maxAttempts attempts"

      - name: Run release verification
        run: npm run release:verify:ci
